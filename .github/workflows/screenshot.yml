name: Capture and Upload Screenshot

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

jobs:
  screenshot:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write

    steps:
    - uses: actions/checkout@v4
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libwayland-dev libxkbcommon-dev libx11-dev libegl1-mesa-dev libgles2-mesa-dev libdbus-1-dev pkg-config xvfb libxkbcommon-x11-0

    - name: Setup Rust
      uses: actions-rust-lang/setup-rust-toolchain@v1

    - name: Run App and Capture Screenshot
      run: |
        xvfb-run -a cargo run --features mock-api -- --test-screenshot --test-screenshot-output=screenshot.png
      env:
        CARGO_TERM_COLOR: always
        RUST_BACKTRACE: 1
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    - name: Upload Screenshot Artifact
      uses: actions/upload-artifact@v4
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        name: app-screenshot
        path: screenshot.png

    - name: Upload Image to Imgur
      if: github.event_name == 'pull_request'
      id: imgur_upload
      uses: devicons/public-upload-to-imgur@v2.2.2
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        path: screenshot.png
        client_id: ${{ secrets.IMGUR_CLIENT_ID }}

    - name: Post Screenshot to PR
      if: github.event_name == 'pull_request'
      uses: actions/github-script@v7
      env:
        FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      with:
        script: |
          const issue_number = context.issue.number;
          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const imageUrl = "${{ steps.imgur_upload.outputs.markdown_urls }}";

          await github.rest.issues.createComment({
            owner,
            repo,
            issue_number,
            body: `📸 **App Screenshot** generated by CI for this PR.\n\n${imageUrl}`
          });
